name: Actualizar Dashboard

on:
  workflow_dispatch: # Permite ejecutarlo manualmente con un botón

jobs:
  generar-dashboard:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Descargar el código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar Script
        run: python generador_dashboard.py

      - name: Mover HTML a la carpeta public
        run: |
          mkdir -p public
          # Renombramos el archivo a index.html para que Vercel lo cargue por defecto
          mv dashboard_conectividad.html public/index.html

      - name: Subir cambios a GitHub
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add public/index.html
          git commit -m "Automated dashboard update [skip ci]" || echo "No hay cambios para subir"
          git push
